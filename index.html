    function Countdown({ t }) {
      const [timeLeft, setTimeLeft] = useState({ days: 0, hours: 0, minutes: 0, seconds: 0 });
      useEffect(() => {
        const target = new Date("September 5, 2026 11:00:00").getTime();
        const id = setInterval(() => {
          const diff = target - Date.now();
          if (diff < 0) return;
          setTimeLeft({
            days: Math.floor(diff / 86400000),
            hours: Math.floor((diff % 86400000) / 3600000),
            minutes: Math.floor((diff % 3600000) / 60000),
            seconds: Math.floor((diff % 60000) / 1000),
          });
        }, 1000);
        return () => clearInterval(id);
      }, []);
      
      return (
        <div className="grid grid-cols-4 gap-4 max-w-sm mx-auto font-sans uppercase tracking-widest">
          {[{v: timeLeft.days, l: t("giorni")}, {v: timeLeft.hours, l: t("ore")}, {v: timeLeft.minutes, l: t("minuti")}, {v: timeLeft.seconds, l: t("secondi")}].map((item, i) => (
            <div key={i} className="flex flex-col items-center">
              <span className="text-3xl md:text-5xl font-light tabular-nums text-[#7a9070]">{String(item.v).padStart(2, "0")}</span>
              <span className="text-[9px] mt-2 font-medium text-[#F4B9A1]">{item.l}</span>
            </div>
          ))}
        </div>
      );
    }

    function PhotoGallery({ t }) {
      const [current, setCurrent] = useState(0);
      const [animating, setAnimating] = useState(false);
      const pausedRef = useRef(false);
      
      const goTo = useCallback((index, fromUser = false) => {
        if (animating) return;
        setAnimating(true);
        if (fromUser) { pausedRef.current = true; setTimeout(() => { pausedRef.current = false; }, 7000); }
        setCurrent((index + PHOTOS.length) % PHOTOS.length);
        
        // Animazione galleria rallentata per morbidezza
        setTimeout(() => setAnimating(false), 1500);
      }, [animating]);
      
      useEffect(() => {
        const id = setInterval(() => { if (!pausedRef.current) goTo(current + 1); }, 4800);
        return () => clearInterval(id);
      }, [current, goTo]);
      
      return (
        <section className="w-full py-24 md:py-32" style={{ backgroundColor: "#f5f0e8" }}>
          <div className="text-center mb-10">
            <p className="font-serif italic text-sm tracking-[0.4em] uppercase font-semibold text-[#F4B9A1]">{t("titoloMomenti")}</p>
          </div>
          <div className="relative mx-auto overflow-hidden" style={{ height: "clamp(260px,50vw,520px)", maxWidth: "900px" }}>
            {PHOTOS.map((src, i) => {
              const offset = ((i - current + PHOTOS.length) % PHOTOS.length);
              const norm = offset > PHOTOS.length / 2 ? offset - PHOTOS.length : offset;
              const abs = Math.abs(norm);
              const style = abs > 1 ? { opacity: 0, pointerEvents: "none", transform: "translateX(0) scale(0.6)" } : 
                            norm === 0 ? { transform: "translateX(0) scale(1)", opacity: 1, zIndex: 10, boxShadow: "0 24px 60px rgba(0,0,0,0.2)" } : 
                            { transform: `translateX(${norm > 0 ? 68 : -68}%) scale(0.78)`, opacity: 0.65, zIndex: 5, cursor: "pointer" };
              return (
                <div key={src} onClick={() => norm !== 0 && goTo(i, true)}
                  className="absolute top-0 left-1/2 ease-out"
                  style={{ 
                     width: "clamp(220px,55vw,560px)", 
                     height: "100%", 
                     marginLeft: "calc(clamp(220px,55vw,560px) / -2)", 
                     transition: "transform 1.5s cubic-bezier(0.25,0.46,0.45,0.94), opacity 1.5s ease, filter 1.5s ease",
                     ...style 
                  }}>
                  <img src={src} className="w-full h-full rounded-sm object-cover" />
                </div>
              );
            })}
          </div>
          <div className="flex items-center justify-center gap-8 mt-8">
            <div className="flex items-center gap-2">
              {PHOTOS.map((_, i) => (
                <button key={i} onClick={() => goTo(i, true)} className="rounded-full transition-all duration-1000"
                  style={{ width: i === current ? "22px" : "7px", height: "7px", backgroundColor: i === current ? "#F4B9A1" : "#A3B899", opacity: i === current ? 1 : 0.6 }} />
              ))}
            </div>
          </div>
        </section>
      );
    }
    
    function Timeline({ t }) {
      const partyRef = useRef(null);
      const firedRef = useRef(false);

      const EVENTS = [
        { time: "11:30", moment: t("arrivo"), detail: t("arrivoDettaglio") },
        { time: "11:45", moment: t("cerimonia"), detail: "" },
        { time: "12:45", moment: t("aperitivo"), detail: t("aperitivoDettaglio") },
        { time: "13:45", moment: t("ricevimento"), detail: "" },
        { time: "17:00", moment: t("torta"), detail: "" },
        { time: "18:00", moment: t("party"), detail: "" },
      ];
      
      useEffect(() => {
        const obs = new IntersectionObserver(([entry]) => {
          if (entry.isIntersecting && !firedRef.current) { 
            firedRef.current = true; 
            confetti({ particleCount:80, spread:60, origin:{y:0.7}, colors:["#A3B899","#F4B9A1"] });
          }
        }, { threshold: 0.8 });
        if(partyRef.current) obs.observe(partyRef.current);
        return () => obs.disconnect();
      }, []);
      
      return (
        <div className="w-full">
          <section className="pt-28 md:pt-40 pb-16 px-6 max-w-2xl mx-auto">
            <div className="text-center mb-16">
              <p className="font-serif italic text-base tracking-[0.4em] uppercase mb-3 font-medium text-[#F4B9A1]">{t("titoloGiornata")}</p>

            </div>
            <div className="relative">
              <div className="absolute left-1/2 top-0 bottom-0 w-px bg-[#A3B899]/40 -translate-x-1/2" />
              <div className="space-y-0 relative z-10">
                {EVENTS.map((ev, i) => {
                  const isLeft  = i % 2 === 0;
                  const isParty = ev.time === "18:00";
                  return (
                    <div key={i} ref={isParty ? partyRef : undefined} className="relative flex items-center min-h-[5.5rem]">
                      <div className={`w-1/2 pr-8 text-right ${isLeft ? "block" : "invisible"}`}>
                        {isLeft && <>
                          <span className="font-sans text-sm font-medium uppercase tracking-[0.25em] block mb-1 text-[#F4B9A1]">{ev.time}</span>
                          <p className={`font-serif leading-tight text-[#7a9070] ${isParty ? "text-[1.2rem] italic" : "text-[1.1rem]"}`}>{isParty ? "🎶 " : ""}{ev.moment}</p>
                          {ev.detail && <p className="font-serif italic text-sm mt-0.5 text-[#7a9070]/80">{ev.detail}</p>}
                        </>}
                      </div>
                      <div className="absolute left-1/2 -translate-x-1/2 z-10">
                        <div className={`rounded-full border-2 ${isParty ? 'w-[14px] h-[14px] border-[#F4B9A1] bg-[#F4B9A1]' : 'w-[10px] h-[10px] border-[#A3B899] bg-[#FDFBF7]'}`} />
                      </div>
                      <div className={`w-1/2 pl-8 ${!isLeft ? "block" : "invisible"}`}>
                        {!isLeft && <>
                          <span className="font-sans text-sm font-medium uppercase tracking-[0.25em] block mb-1 text-[#F4B9A1]">{ev.time}</span>
                          <p className={`font-serif leading-tight text-[#7a9070] ${isParty ? "text-[1.2rem] italic" : "text-[1.1rem]"}`}>{isParty ? "🎶 " : ""}{ev.moment}</p>
                          {ev.detail && <p className="font-serif italic text-sm mt-0.5 text-[#7a9070]/80">{ev.detail}</p>}
                        </>}
                      </div>
                    </div>
                  );

<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Debora & Luca · 5 Settembre 2026</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ["'Cormorant Garamond'", "serif"],

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { background: #FDFBF7; overflow: hidden; }
    ::placeholder { opacity: 0.5; color: #A3B899; }
    select option { background: #FDFBF7; color: #7a9070; }

    .btn-premium:disabled { opacity: 0.7; cursor: not-allowed; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useEffect, useRef, useState, useCallback, forwardRef } = React;
    gsap.registerPlugin(ScrollTrigger);
    
    /* === [CONFIG_GLOBALS] ASSETS & DATA === */
    const MUSIC_URL = "https://ik.imagekit.io/hiacc/audio_sposi.mp3"; 
    
    // 1. VIDEO DELLA BUSTA
    const VIDEO_URL = "https://ik.imagekit.io/hiacc/Template_D&L/B%20verde_CL%20Bianca%20D&L.mp4";
    
    // 2. COPERTINA STATICA
    const VIDEO_POSTER = "https://res.cloudinary.com/dvjgznbzm/image/upload/v1778739412/COPERTINA_B_Pesco_CL_Bianca_D_L_znvceb.png";
    
    // 3. VIDEO DEGLI SPOSI
    const WATERMARK_VIDEO_URL = "https://res.cloudinary.com/dvjgznbzm/video/upload/v1778709640/cornice_fiori_sposi_def_jc9d35.mp4"; 
    
    const LOCATION_IMG = "https://res.cloudinary.com/dvjgznbzm/image/upload/v1775293975/IMG_2668_zslsvj.png";
    const PARTY_IMG    = "https://res.cloudinary.com/dvjgznbzm/image/upload/v1775304249/IMG_2907_jknv2c.png";

    const PHOTOS = [
      "https://res.cloudinary.com/dvjgznbzm/image/upload/f_auto,q_auto,w_1400/v1774796845/IMG_4307_withcw.jpg",
      "https://res.cloudinary.com/dvjgznbzm/image/upload/f_auto,q_auto,w_1400/v1774796848/IMG_8780_y48grg.jpg",
      "https://res.cloudinary.com/dvjgznbzm/image/upload/f_auto,q_auto,w_1400/v1774796848/IMG_2553_vcrcg0.jpg",
      "https://res.cloudinary.com/dvjgznbzm/image/upload/f_auto,q_auto,w_1400/v1774796847/IMG_2688_daidh8.jpg",
      "https://res.cloudinary.com/dvjgznbzm/image/upload/f_auto,q_auto,w_1400/v1774796846/IMG_3396_rebrbg.jpg",
      "https://res.cloudinary.com/dvjgznbzm/image/upload/f_auto,q_auto,w_1400/v1775308399/IMG_3404_ayt6zq.jpg",
      "https://res.cloudinary.com/dvjgznbzm/image/upload/f_auto,q_auto,w_1400/v1775308397/IMG_1195_xbmxd7.jpg",
      "https://res.cloudinary.com/dvjgznbzm/image/upload/f_auto,q_auto,w_1400/v1775308397/IMG_8739_mlh40h.jpg",
      "https://res.cloudinary.com/dvjgznbzm/image/upload/f_auto,q_auto,w_1400/v1775308396/IMG_9341_rfes8h.jpg",
      "https://res.cloudinary.com/dvjgznbzm/image/upload/f_auto,q_auto,w_1400/v1775308394/8664BC80-4060-442E-8F70-0CC77A1439FC_b7bxf5.jpg",
    ];
    
    /* === [COMP_DIVIDER] === */
    function BotanicalDivider({ className = "" }) {
      return (
        <div className={`flex items-center justify-center py-12 md:py-20 ${className}`}>
          <svg width="320" height="32" viewBox="0 0 320 32" fill="none" style={{ opacity: 0.75 }}>
            <line x1="0" y1="16" x2="112" y2="16" stroke="#A3B899" strokeWidth="0.75" />
            <path d="M112 16 Q118 10 124 8" stroke="#A3B899" strokeWidth="0.75" fill="none" strokeLinecap="round" />
            <path d="M116 16 Q120 11 125 12" stroke="#A3B899" strokeWidth="0.75" fill="none" strokeLinecap="round" />
            <path d="M120 16 Q122 20 126 22" stroke="#A3B899" strokeWidth="0.75" fill="none" strokeLinecap="round" />
            <line x1="124" y1="6" x2="132" y2="16" stroke="#A3B899" strokeWidth="0.75" strokeLinecap="round" />
            <path d="M128 12 Q130 8 133 7" stroke="#A3B899" strokeWidth="0.75" fill="none" strokeLinecap="round" />
            <rect x="154" y="10" width="12" height="12" transform="rotate(45 160 16)" stroke="#A3B899" strokeWidth="1" fill="#FDFBF7" />
            <rect x="157" y="13" width="6" height="6" transform="rotate(45 160 16)" fill="#A3B899" fillOpacity="0.6" />
            <line x1="196" y1="16" x2="188" y2="6" stroke="#A3B899" strokeWidth="0.75" strokeLinecap="round" />
            <path d="M192 12 Q190 8 187 7" stroke="#A3B899" strokeWidth="0.75" fill="none" strokeLinecap="round" />
            <path d="M208 16 Q202 10 196 8" stroke="#A3B899" strokeWidth="0.75" fill="none" strokeLinecap="round" />
            <path d="M204 16 Q200 11 195 12" stroke="#A3B899" strokeWidth="0.75" fill="none" strokeLinecap="round" />
            <path d="M200 16 Q198 20 194 22" stroke="#A3B899" strokeWidth="0.75" fill="none" strokeLinecap="round" />
            <line x1="208" y1="16" x2="320" y2="16" stroke="#A3B899" strokeWidth="0.75" />
          </svg>
        </div>
      );
    }
    
    /* === [SECT_HERO] Video (Senza cornice) & Monogram === */
    const VideoHero = forwardRef(({ videoRef }, ref) => {
      return (
        <div className="absolute inset-0 flex items-center justify-center pointer-events-none select-none overflow-hidden" aria-hidden="true" style={{ zIndex: 0 }}>
          <div ref={ref} className="relative w-[85vw] sm:w-[50vw] max-w-lg rounded-[1.5rem] overflow-hidden shadow-2xl" style={{ opacity: 0, transform: "scale(0.95)", willChange: "opacity, transform" }}>
            <video ref={videoRef} autoPlay={true} loop={true} muted={true} playsInline={true} className="w-full h-auto pointer-events-none select-none" style={{ filter: "contrast(1.05)" }}>
              <source src={WATERMARK_VIDEO_URL} type="video/mp4" />
            </video>
          </div>
        </div>
      );
    });

    const Monogram = forwardRef((props, ref) => {
      return (
        <div className="absolute inset-0 flex items-center justify-center pointer-events-none select-none overflow-hidden" aria-hidden="true" style={{ zIndex: 1 }}>
          <span ref={ref} className="font-serif italic leading-none"
            style={{ fontSize: "clamp(12rem,30vw,24rem)", color: "#A3B899", opacity: 0.8, transform: "scale(1.15)", letterSpacing: "-0.02em", userSelect: "none", willChange: "opacity, transform" }}>
            D&L
          </span>
        </div>
      );
    });
    
    /* === [SECT_COUNTDOWN] === */
    function Countdown() {
      const [timeLeft, setTimeLeft] = useState({ days: 0, hours: 0, minutes: 0, seconds: 0 });
      useEffect(() => {
        const target = new Date("September 5, 2026 11:00:00").getTime();
        function update() {
          const diff = target - Date.now();
          if (diff < 0) return;
          setTimeLeft({
            days:    Math.floor(diff / 86400000),
            hours:   Math.floor((diff % 86400000) / 3600000),
            minutes: Math.floor((diff % 3600000) / 60000),
            seconds: Math.floor((diff % 60000) / 1000),
          });
        }
        update();
        const id = setInterval(update, 1000);
        return () => clearInterval(id);
      }, []);
      
      const units = [
        { value: timeLeft.days,    label: "giorni" },
        { value: timeLeft.hours,   label: "ore" },
        { value: timeLeft.minutes, label: "minuti" },
        { value: timeLeft.seconds, label: "secondi" },
      ];
      
      return (
        <div className="grid grid-cols-4 gap-4 max-w-lg mx-auto font-sans uppercase tracking-widest">
          {units.map(({ value, label }) => (
            <div key={label} className="flex flex-col items-center">
              <span className="text-4xl md:text-6xl font-normal tabular-nums" style={{ color: "#7a9070" }}>
                {String(value).padStart(2, "0")}
              </span>
              <span className="text-[10px] mt-1 font-semibold" style={{ color: "#F4B9A1" }}>{label}</span>
            </div>
          ))}
        </div>
      );
    }
    
    /* === [COMP_AUDIO] === */
    function MusicPlayer({ playing, onToggle }) {
      return (
        <button onClick={onToggle} title={playing ? "Disattiva audio" : "Attiva audio"}
          className="fixed bottom-6 right-6 z-50 flex items-center justify-center rounded-full shadow-md transition-all"
          style={{ width: 44, height: 44, backgroundColor: "#FDFBF7", border: "1px solid #A3B899", color: "#7a9070" }}
          onMouseEnter={e => { e.currentTarget.style.backgroundColor="#A3B899"; e.currentTarget.style.color="#FDFBF7"; }}
          onMouseLeave={e => { e.currentTarget.style.backgroundColor="#FDFBF7"; e.currentTarget.style.color="#7a9070"; }}>
          {playing ? (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
            </svg>
          ) : (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
              <line x1="23" y1="9" x2="17" y2="15"></line>
              <line x1="17" y1="9" x2="23" y2="15"></line>
            </svg>
          )}
        </button>
      );
    }
    
    /* === [SECT_RSVP] Ornaments === */
    function Corner({ flip = false }) {
      return (
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none"
          style={{ transform: flip ? "scale(-1,-1)" : "none", opacity: 0.8 }}>
          <path d="M2 34 L2 8 Q2 2 8 2 L34 2" stroke="#A3B899" strokeWidth="0.8" fill="none" strokeLinecap="round"/>
          <path d="M2 20 Q10 12 18 10" stroke="#A3B899" strokeWidth="0.7" fill="none" strokeLinecap="round"/>
          <path d="M8 28 Q12 20 16 18" stroke="#A3B899" strokeWidth="0.6" fill="none" strokeLinecap="round"/>
          <circle cx="2" cy="34" r="1.5" fill="#A3B899" fillOpacity="0.5"/>
          <circle cx="34" cy="2" r="1.5" fill="#A3B899" fillOpacity="0.5"/>
        </svg>
      );
    }
    function CornerOrnaments({ children }) {
      return (
        <div className="relative">
          <div className="absolute top-4 left-4 z-10"><Corner /></div>
          <div className="absolute top-4 right-4 z-10" style={{ transform: "scaleX(-1)" }}><Corner /></div>
          <div className="absolute bottom-4 left-4 z-10" style={{ transform: "scaleY(-1)" }}><Corner /></div>
          <div className="absolute bottom-4 right-4 z-10"><Corner flip /></div>
          {children}
        </div>
      );
    }
    
    /* === [SECT_GALLERY] === */
    function getCardStyle(offset) {
      const abs = Math.abs(offset);
      if (abs > 1) return { opacity: 0, pointerEvents: "none", zIndex: 0, transform: "translateX(0) scale(0.6)", filter: "blur(12px)" };
      if (offset === 0) return { transform: "translateX(0) scale(1)", filter: "blur(0px)", opacity: 1, zIndex: 10, boxShadow: "0 24px 60px rgba(0,0,0,0.28)", cursor: "default" };
      const sign = offset > 0 ? 1 : -1;
      return { transform: `translateX(${sign * 68}%) scale(0.78)`, filter: "blur(5px)", opacity: 0.65, zIndex: 5, cursor: "pointer" };
    }
    
    function PhotoGallery() {
      const [current, setCurrent] = useState(0);
      const [animating, setAnimating] = useState(false);
      const pausedRef = useRef(false);
      const timerRef  = useRef(null);
      
      const goTo = useCallback((index, fromUser = false) => {
        if (animating) return;
        setAnimating(true);
        if (fromUser) { pausedRef.current = true; setTimeout(() => { pausedRef.current = false; }, 7000); }
        setCurrent((index + PHOTOS.length) % PHOTOS.length);
        setTimeout(() => setAnimating(false), 600);
      }, [animating]);
      
      useEffect(() => {
        const tick = () => { if (!pausedRef.current) goTo(current + 1); timerRef.current = setTimeout(tick, 4800); };
        timerRef.current = setTimeout(tick, 4800);
        return () => { if (timerRef.current) clearTimeout(timerRef.current); };
      }, [current, goTo]);
      
      return (
        <section className="w-full py-24 md:py-32" style={{ backgroundColor: "#f5f0e8" }}>
          <div className="text-center mb-10">
            <p className="font-serif italic text-sm tracking-[0.4em] uppercase" style={{ color: "#F4B9A1" }}>✦   I nostri momenti   ✦</p>
          </div>
          <div className="relative mx-auto overflow-hidden" style={{ height: "clamp(260px,50vw,520px)", maxWidth: "900px" }}>
            {PHOTOS.map((src, i) => {
              const offset = ((i - current + PHOTOS.length) % PHOTOS.length);
              const norm = offset > PHOTOS.length / 2 ? offset - PHOTOS.length : offset;
              const s = getCardStyle(norm);
              return (
                <div key={src} onClick={() => norm !== 0 && goTo(i, true)}
                  className="absolute top-0 left-1/2"
                  style={{ width: "clamp(220px,55vw,560px)", height: "100%", marginLeft: "calc(clamp(220px,55vw,560px) / -2)",
                    transition: "transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94), opacity 0.6s ease, filter 0.6s ease", ...s }}>
                  <img src={src} alt="" onError={(e) => { e.target.style.display = 'none'; }} className="w-full h-full rounded-sm"
                    style={{ objectFit: "cover", display: "block", filter: "contrast(1.14) saturate(0.72) brightness(0.88) sepia(0.18)" }} draggable={false} />
                  <div className="absolute inset-0 rounded-sm pointer-events-none"
                    style={{ background: "linear-gradient(160deg,rgba(122,144,112,0.14) 0%,transparent 45%,rgba(193,120,80,0.13) 100%)", mixBlendMode: "multiply" }} />
                  <div className="absolute inset-0 rounded-sm pointer-events-none"
                    style={{ background: "radial-gradient(ellipse at center,transparent 55%,rgba(10,8,5,0.55) 100%)" }} />
                  {norm === 0 && <div className="absolute inset-0 rounded-sm pointer-events-none" style={{ border: "1px solid rgba(163,184,153,0.35)" }} />}
                </div>
              );
            })}
          </div>
          <div className="flex items-center justify-center gap-8 mt-8">
            <button onClick={() => goTo(current - 1, true)} className="flex items-center justify-center opacity-70 hover:opacity-100 transition-opacity" style={{ width: 36, height: 36 }}>
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M12 3 L6 9 L12 15" stroke="#7a9070" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/></svg>
            </button>
            <div className="flex items-center gap-2">
              {PHOTOS.map((_, i) => (
                <button key={i} onClick={() => goTo(i, true)} className="rounded-full transition-all duration-500"
                  style={{ width: i === current ? "22px" : "7px", height: "7px", backgroundColor: i === current ? "#F4B9A1" : "#A3B899", opacity: i === current ? 1 : 0.6 }} />
              ))}
            </div>
            <button onClick={() => goTo(current + 1, true)} className="flex items-center justify-center opacity-70 hover:opacity-100 transition-opacity" style={{ width: 36, height: 36 }}>
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M6 3 L12 9 L6 15" stroke="#7a9070" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/></svg>
            </button>
          </div>
        </section>
      );
    }
    
    /* === [SECT_QUOTES] === */
    const QUOTES = [
      { text: "E ho guardato dentro un'emozione, e ci ho visto dentro tanto amore...", author: "Vasco Rossi" },
      { text: "Se l'universo intero ci ha fatto incontrare, qualcosa di sicuro vorrà dire.", author: "Ligabue" },
    ];
    const FULL_ITEMS = [...QUOTES, ...QUOTES, ...QUOTES, ...QUOTES];
    
    function QuotesTicker() {
      const trackRef = useRef(null);
      const tweenRef = useRef(null);
      
      useEffect(() => {
        const track = trackRef.current;
        if (!track) return;
        const totalW = track.scrollWidth / 2;
        tweenRef.current = gsap.to(track, { x: -totalW, duration: 60, ease: "none", repeat: -1,
          modifiers: { x: gsap.utils.unitize(v => parseFloat(v) % totalW) } });
        return () => { tweenRef.current && tweenRef.current.kill(); };
      }, []);
      
      return (
        <div className="w-full overflow-hidden py-16 md:py-20"
          style={{ borderTop: "1px solid rgba(163,184,153,0.3)", borderBottom: "1px solid rgba(163,184,153,0.3)" }}>
          <div ref={trackRef} className="flex items-center gap-0 whitespace-nowrap will-change-transform"
            onMouseEnter={() => tweenRef.current && tweenRef.current.timeScale(0.25)}
            onMouseLeave={() => tweenRef.current && tweenRef.current.timeScale(1)}>
            {FULL_ITEMS.map((q, i) => (
              <div key={i} className="inline-flex items-center gap-8 px-14" style={{ flexShrink: 0 }}>
                <span className="font-serif italic" style={{ color: "#7a9070", fontSize: "clamp(1rem,2.2vw,1.25rem)", letterSpacing: "0.01em" }}>
                  “{q.text}”
                </span>
                <span className="font-sans uppercase font-medium" style={{ color: "#F4B9A1", fontSize: "0.62rem", letterSpacing: "0.35em", flexShrink: 0 }}>
                  — {q.author}
                </span>
                <span style={{ color: "#A3B899", opacity: 0.6, fontSize: "0.5rem" }}>✦</span>
              </div>
            ))}
          </div>
        </div>
      );
    }
    
    /* === [SECT_TIMELINE] === */
    const EVENTS = [
      { time: "11:30", moment: "Accoglienza",            detail: "Arrivo degli ospiti" },
      { time: "11:45", moment: "Cerimonia Civile",       detail: "" },
      { time: "12:45", moment: "Aperitivo di Benvenuto", detail: "Buffet" },
      { time: "13:45", moment: "Il Ricevimento",         detail: "" },
      { time: "17:00", moment: "Taglio della Torta",     detail: "" },
      { time: "18:00", moment: "Party & Live Band",      detail: "" },
    ];
    
    function launchConfetti() {
      const colors = ["#A3B899","#F4B9A1","#c8dbc3","#f7cebb","#7a9070"];
      const burst = (angle, x) => confetti({ particleCount:18, angle, spread:55, origin:{x, y:0.7}, colors, shapes:["circle","square"], scalar:0.9, drift:0.4, gravity:0.9, ticks:200 });
      burst(60,0.2); setTimeout(()=>burst(120,0.8),150); setTimeout(()=>burst(80,0.4),320); setTimeout(()=>burst(100,0.6),480);
    }
    
    function Timeline() {
      const partyRef = useRef(null);
      const firedRef = useRef(false);
      
      useEffect(() => {
        const el = partyRef.current;
        if (!el) return;
        const obs = new IntersectionObserver(([entry]) => {
          if (entry.isIntersecting && !firedRef.current) { firedRef.current = true; launchConfetti(); }
        }, { threshold: 0.8 });
        obs.observe(el);
        return () => obs.disconnect();
      }, []);
      
      return (
        <div className="w-full">
          <section className="pt-28 md:pt-40 pb-16 px-6 max-w-2xl mx-auto">
            <div className="text-center mb-16">
              <p className="font-serif italic text-base tracking-[0.4em] uppercase mb-3" style={{ color: "#F4B9A1" }}>✦   La Giornata   ✦</p>
              <h2 className="font-serif text-4xl md:text-5xl font-light" style={{ color: "#7a9070" }}>Programma</h2>
            </div>
            <div className="relative">
              <div className="absolute left-1/2 top-0 bottom-0 w-px" style={{ backgroundColor: "#A3B899", opacity: 0.4, transform: "translateX(-50%)" }} />
              <div className="space-y-0 relative z-10">
                {EVENTS.map((ev, i) => {
                  const isLeft  = i % 2 === 0;
                  const isParty = ev.moment === "Party & Live Band";
                  return (
                    <div key={i} ref={isParty ? partyRef : undefined} className="relative flex items-center" style={{ minHeight: "5.5rem" }}>
                      <div className={`w-1/2 pr-8 text-right ${isLeft ? "block" : "invisible"}`}>
                        {isLeft && <>
                          <span className="font-sans text-sm font-semibold uppercase tracking-[0.25em] block mb-1" style={{ color: "#F4B9A1" }}>{ev.time}</span>
                          <p className="font-serif font-medium leading-tight" style={{ color: "#7a9070", fontSize: isParty?"1.2rem":"1.1rem", fontStyle: isParty?"italic":"normal" }}>
                            {isParty ? "🎶 " : ""}{ev.moment}
                          </p>
                          {ev.detail && <p className="font-serif italic text-sm mt-0.5" style={{ color: "#7a9070", opacity: 0.8 }}>{ev.detail}</p>}
                        </>}
                      </div>
                      <div className="absolute left-1/2 -translate-x-1/2 z-10">
                        <div className="rounded-full border-2" style={{ width: isParty?"14px":"10px", height: isParty?"14px":"10px", borderColor: isParty?"#F4B9A1":"#A3B899", backgroundColor: isParty?"#F4B9A1":"#FDFBF7" }} />
                      </div>
                      <div className={`w-1/2 pl-8 ${!isLeft ? "block" : "invisible"}`}>
                        {!isLeft && <>
                          <span className="font-sans text-sm font-semibold uppercase tracking-[0.25em] block mb-1" style={{ color: "#F4B9A1" }}>{ev.time}</span>
                          <p className="font-serif font-medium leading-tight" style={{ color: "#7a9070", fontSize: isParty?"1.2rem":"1.1rem", fontStyle: isParty?"italic":"normal" }}>
                            {isParty ? "🎶 " : ""}{ev.moment}
                          </p>
                          {ev.detail && <p className="font-serif italic text-sm mt-0.5" style={{ color: "#7a9070", opacity: 0.8 }}>{ev.detail}</p>}
                        </>}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </section>
          
          <div className="w-full reveal overflow-hidden flex justify-center items-end mt-4">
             <img src={PARTY_IMG} alt="Party e balli" className="w-full h-auto block max-w-2xl mx-auto" style={{ 
               mixBlendMode: 'multiply', 
               opacity: 0.9, 
               filter: 'contrast(1.1) sepia(0.15)',
               WebkitMaskImage: 'linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%)',
               maskImage: 'linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%)'
             }} />
          </div>
        </div>
      );
    }
    
    /* === [SECT_RSVP] Form === */
    function RSVPForm() {
      const [name, setName]           = useState("");
      const [attending, setAttending] = useState("");
      const [guests, setGuests]       = useState("1");
      const [song, setSong]           = useState("");
      const [notes, setNotes]         = useState("");
      const [submitted, setSubmitted] = useState(false);
      const [submitting, setSubmitting] = useState(false);
      
      const inputStyle = { borderBottom: "1px solid #7a9070", color: "#4A4A4A" };
      
      const handleSubmit = (e) => {
        e.preventDefault();
        setSubmitting(true);
        setTimeout(() => {
          setSubmitting(false);
          setSubmitted(true);
        }, 1500);
      };

      return (
        <section className="py-28 md:py-40 px-6 max-w-xl mx-auto">
          <div className="text-center mb-14">
            <p className="font-serif italic text-base tracking-[0.4em] uppercase mb-3" style={{ color: "#F4B9A1" }}>✦   Conferma la tua presenza   ✦</p>
            <p className="font-serif italic text-xl" style={{ color: "#7a9070" }}>entro il 31 Luglio 2026</p>
          </div>
          <CornerOrnaments>
            <div className="px-10 py-10">
              {submitted ? (
                <div className="text-center py-12 animate-fade-in">
                  <p className="font-serif italic text-2xl mb-3" style={{ color: "#7a9070" }}>Grazie per la tua risposta!</p>
                  <p className="font-sans text-sm uppercase tracking-widest" style={{ color: "#F4B9A1" }}>Non vediamo l'ora di festeggiare con te.</p>
                </div>
              ) : (
                <form onSubmit={handleSubmit} className="space-y-8 relative">
                  {submitting && (
                    <div className="absolute inset-0 bg-[#FDFBF7]/80 flex items-center justify-center z-20 backdrop-blur-sm">
                      <div className="font-sans text-xs uppercase tracking-widest animate-pulse" style={{ color: "#7a9070" }}>Invio in corso...</div>
                    </div>
                  )}
                  <div>
                    <label className="block font-sans text-xs uppercase tracking-[0.3em] mb-2 font-medium" style={{ color: "#7a9070" }}>Nome e Cognome</label>
                    <input type="text" required value={name} onChange={e => setName(e.target.value)}
                      className="w-full bg-transparent py-2 font-serif text-lg focus:outline-none"
                      style={inputStyle} placeholder="Il tuo nome" />
                  </div>
                  <div>
                    <label className="block font-sans text-xs uppercase tracking-[0.3em] mb-3 font-medium" style={{ color: "#7a9070" }}>Parteciperai?</label>
                    <div className="flex gap-8">
                      {["si","no"].map(val => (
                        <button key={val} type="button" onClick={() => setAttending(val)} className="flex items-center gap-2 cursor-pointer">
                          <div className="w-4 h-4 rounded-full border flex items-center justify-center transition-all"
                            style={{ borderColor: attending===val?"#7a9070":"#A3B899", backgroundColor: attending===val?"#7a9070":"transparent" }}>
                            {attending===val && <div className="w-1.5 h-1.5 rounded-full bg-white" />}
                          </div>
                          <span className="font-sans text-xs font-semibold uppercase tracking-[0.2em]" style={{ color: attending===val?"#7a9070":"#A3B899" }}>
                            {val==="si" ? "Sì, ci sarò!" : "No, non potrò esserci .."}
                          </span>
                        </button>
                      ))}
                    </div>
                  </div>
                  {attending==="si" && (
                    <div className="animate-fade-in">
                      <label className="block font-sans text-xs uppercase tracking-[0.3em] mb-2 font-medium" style={{ color: "#7a9070" }}>Numero di persone (incluso te)</label>
                      <select value={guests} onChange={e => setGuests(e.target.value)}
                        className="w-full bg-transparent py-2 font-serif text-xl focus:outline-none cursor-pointer text-center" 
                        style={{ ...inputStyle, textAlignLast: "center" }}>
                        {[1,2,3,4,5,6].map(n => <option key={n} value={String(n)}>{n}</option>)}
                      </select>
                    </div>
                  )}
                  <div>
                    <label className="block font-sans text-xs uppercase tracking-[0.3em] mb-2 font-medium" style={{ color: "#7a9070" }}>Note o intolleranze alimentari</label>
                    <textarea value={notes} onChange={e => setNotes(e.target.value)} rows={3}
                      className="w-full bg-transparent py-2 font-serif text-base focus:outline-none resize-none"
                      style={inputStyle} placeholder="Eventuali note..." />
                  </div>
                  <div>
                    <label className="block font-sans text-xs uppercase tracking-[0.3em] mb-2 font-medium" style={{ color: "#7a9070" }}>🎵   La tua canzone del cuore</label>
                    <input type="text" value={song} onChange={e => setSong(e.target.value)}
                      className="w-full bg-transparent py-2 font-serif text-lg focus:outline-none"
                      style={inputStyle} placeholder="Titolo – Artista" />
                    <p className="font-serif italic text-sm mt-1" style={{ color: "#7a9070", opacity: 0.8 }}>La includeremo nella playlist della serata!</p>
                  </div>
                  <button type="submit"
                    disabled={!attending || !name}
                    className="w-full py-4 text-center font-sans text-xs font-bold uppercase tracking-[0.4em] btn-premium"
                    style={{ backgroundColor: "#A3B899", color: "#FDFBF7" }}
                    onMouseEnter={e => { if(!e.currentTarget.disabled) e.currentTarget.style.backgroundColor="#7a9070"; }}
                    onMouseLeave={e => { if(!e.currentTarget.disabled) e.currentTarget.style.backgroundColor="#A3B899"; }}>
                    Conferma Presenza
                  </button>
                </form>
              )}
            </div>
          </CornerOrnaments>
        </section>
      );
    }
    
    /* === [MAIN_APP] Orchestrator === */
    function App() {
      const videoRef        = useRef(null);
      const clickAreaRef    = useRef(null);
      const preloaderRef    = useRef(null);
      const mainContentRef  = useRef(null);
      const heroTextRef     = useRef(null);
      const scrollArrowRef  = useRef(null);
      const monogramRef     = useRef(null);
      const watermarkRef    = useRef(null);
      const watermarkVideoRef = useRef(null);
      const textCiSposiamoFullscreenRef = useRef(null);
      const bgAudioRef      = useRef(null);
      const flashRef        = useRef(null); 
      const sequenceStarted = useRef(false);
      
      const [preloaderHidden, setPreloaderHidden] = useState(false);
      const [musicPlaying, setMusicPlaying]       = useState(false);
      
      /* --- Audio Visibility Handling --- */
      useEffect(() => {
        const handleVisibilityChange = () => {
          const a = bgAudioRef.current;
          if (!a) return;
          if (document.hidden) {
            a.pause();
          } else if (musicPlaying) {
            a.play().catch(() => {});
          }
        };
        document.addEventListener("visibilitychange", handleVisibilityChange);
        return () => document.removeEventListener("visibilitychange", handleVisibilityChange);
      }, [musicPlaying]);

      /* --- [COMP_PRELOADER] Video Event Listener --- */
      useEffect(() => {
        const video = videoRef.current;
        if (!video) return;

        const startSequence = () => {
          if (!sequenceStarted.current) {
            sequenceStarted.current = true;
            runCinematicSequence();
          }
        };

        const onTime = () => {
          if (video.currentTime >= 5.5) {
            startSequence();
          }
        };

        video.addEventListener("timeupdate", onTime);
        video.addEventListener("ended", startSequence); 
        
        return () => {
          video.removeEventListener("timeupdate", onTime);
          video.removeEventListener("ended", startSequence);
        };
      }, []);
      
      /* --- ScrollTrigger Animations --- */
      useEffect(() => {
        if (!preloaderHidden) return;
        document.querySelectorAll(".stagger-group").forEach(group => {
          gsap.fromTo(Array.from(group.children), { opacity: 0, y: 28 }, { opacity: 1, y: 0, duration: 1, stagger: 0.18, ease: "power3.out",
            scrollTrigger: { trigger: group, start: "top 82%" } });
        });
        document.querySelectorAll(".reveal").forEach(el =>
          gsap.fromTo(el, { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: 1, ease: "power3.out", scrollTrigger: { trigger: el, start: "top 85%" } }));
        ScrollTrigger.refresh();
      }, [preloaderHidden]);
      
      /* --- GSAP Cinematic Sequence Aggiornata --- */
      function runCinematicSequence() {
        const tl = gsap.timeline();
        
        // 1. Flash bianco & spegnimento preloader
        tl.to(flashRef.current, { opacity: 1, duration: 0.8, ease: "power2.in" })
          .to(videoRef.current, { opacity: 0, duration: 0.1 }, "-=0.1")
          .to(preloaderRef.current, { opacity: 0, duration: 0.5, onComplete: () => {
            if (preloaderRef.current) preloaderRef.current.style.display = "none";
            document.body.style.overflow = "auto";
            setPreloaderHidden(true);
          }}, "+=0.2")
          
          // Appare il contenitore principale mentre svanisce il flash
          .to(flashRef.current, { opacity: 0, duration: 1.5, ease: "power2.out" })
          .to(mainContentRef.current, { opacity: 1, duration: 0.5 }, "-=1.5")
          
          // 2. Mostra "Ci Sposiamo!"
          .to(monogramRef.current, { opacity: 0.055, scale: 1, duration: 1.5, ease: "power2.inOut" }, "-=1")
          .to(textCiSposiamoFullscreenRef.current, { opacity: 1, duration: 1.5, ease: "power2.inOut" }, "<")
          
          // Pausa per leggere la scritta
          .to({}, { duration: 1.5 })
          
          // 3. "Ci Sposiamo" svanisce -> IL VIDEO SPOSI APPARE IN PRIMO PIANO
          .to(textCiSposiamoFullscreenRef.current, { opacity: 0, scale: 0.85, duration: 1.0, ease: "power2.inOut" })
          .to(monogramRef.current, { opacity: 0, scale: 0.85, duration: 1.0, ease: "power2.inOut" }, "<")
          .to(watermarkRef.current, { opacity: 1, scale: 1.05, duration: 1.0, ease: "power2.inOut" }, "<") // Opacità 100% per il video
          
          // Lasciamo godere il video per 1.2 secondi esatti
          .to({}, { duration: 1.2 })
          
          // 4. Il video passa in background (opacità si abbassa) e appaiono i testi
          .to(watermarkRef.current, { opacity: 0.18, scale: 1, duration: 1.5, ease: "power3.inOut" })
          .to(heroTextRef.current, { opacity: 1, y: 0, duration: 1.5, ease: "power3.out" }, "-=1.0")
          .to(scrollArrowRef.current, { autoAlpha: 1, duration: 1.5, ease: "power3.out" }, "<");
      }
      
      /* --- Eventi al Click (CON FIX DI SICUREZZA) --- */
      function handleClick() {
        if (clickAreaRef.current) clickAreaRef.current.style.pointerEvents = 'none';
        
        // Fai partire la musica
        startMusic();
        
        // Fai partire il video in background
        if (watermarkVideoRef.current) {
          watermarkVideoRef.current.muted = true;
          watermarkVideoRef.current.play().catch(() => {});
        }

        // Fai partire la busta
        if (videoRef.current) {
          videoRef.current.muted = true;
          videoRef.current.play().catch(e => {
            console.warn("Video della busta bloccato dal browser", e);
            if (!sequenceStarted.current) {
              sequenceStarted.current = true;
              runCinematicSequence();
            }
          });
        }

        // FALLBACK DEFINITIVO
        setTimeout(() => {
          if (!sequenceStarted.current) {
             console.warn("Timeout raggiunto, forzatura dell'apertura dell'invito.");
             sequenceStarted.current = true;
             runCinematicSequence();
          }
        }, 6500);
      }
      
      function startMusic() {
        const a = bgAudioRef.current;
        if (!a) return;
        a.volume = 0.25; a.loop = true;
        a.play().then(() => setMusicPlaying(true)).catch(() => {});
      }
      
      function toggleMusic() {
        const a = bgAudioRef.current;
        if (!a) return;
        if (musicPlaying) { a.pause(); setMusicPlaying(false); }
        else { a.play().then(() => setMusicPlaying(true)).catch(() => {}); }
      }
      
      return (
        <>
          <audio ref={bgAudioRef} src={MUSIC_URL} preload="auto" />
          
          {/* Effetto Flash Bianco */}
          <div ref={flashRef} className="fixed inset-0 z-[250] bg-white opacity-0 pointer-events-none"></div>

          {/* [COMP_PRELOADER] */}
          <div ref={preloaderRef} className="fixed inset-0 z-[200] flex items-center justify-center overflow-hidden"
            style={{ backgroundColor: "#FDFBF7" }}>
            <div ref={clickAreaRef} onClick={handleClick} className="absolute inset-0 z-[210] cursor-pointer" />
            
            {/* Immagine di copertina statica fornita, copre il video prima del play */}
            <img src={VIDEO_POSTER} alt="Invito" className="absolute inset-0 w-full h-full object-cover object-center pointer-events-none" style={{ zIndex: 1 }} />
            
            <video ref={videoRef} muted={true} playsInline={true} preload="auto" poster={VIDEO_POSTER} 
              className="absolute inset-0 w-full h-full object-cover object-center pointer-events-none select-none" style={{ transformOrigin: "center", zIndex: 2 }}>
              <source src={VIDEO_URL} type="video/mp4" />
            </video>
          </div>
          
          <div ref={mainContentRef} className="opacity-0 overflow-x-hidden" style={{ backgroundColor:"#FDFBF7" }}>
            
            {/* [SECT_HERO] */}
            <section className="relative h-screen w-full flex items-center justify-center overflow-hidden" style={{ backgroundColor:"#FDFBF7" }}>
              <VideoHero ref={watermarkRef} videoRef={watermarkVideoRef} />
              <Monogram ref={monogramRef} />
              
              <div ref={textCiSposiamoFullscreenRef} className="absolute inset-0 flex items-center justify-center pointer-events-none opacity-0" style={{ zIndex: 2, transform: 'scale(1)', willChange: 'opacity, transform' }}>
                <h2 className="font-serif italic text-6xl md:text-8xl" style={{ color:"#7a9070" }}>Ci Sposiamo!</h2>
              </div>

              <div ref={heroTextRef} className="absolute inset-0 flex flex-col justify-between pt-[24vh] md:pt-[26vh] pb-[22vh] px-10 md:px-16 text-center opacity-0 pointer-events-none mx-auto max-w-lg" style={{ transform:"translateY(40px)", zIndex:2 }}>
                <div>
                  <h1 className="font-serif text-5xl md:text-7xl font-normal leading-none" style={{ color:"#7a9070", textShadow: "0 4px 20px rgba(253, 251, 247, 0.6)" }}>
                    Debora <span style={{ color:"#F4B9A1" }}>&</span> Luca
                  </h1>
                  <p className="font-serif italic text-2xl md:text-3xl mt-4 md:mt-6" style={{ color:"#7a9070", textShadow: "0 4px 15px rgba(253, 251, 247, 0.6)", fontWeight: 400 }}>
                    Siamo felici di invitarvi al nostro matrimonio
                  </p>
                </div>
                <div>
                  <p className="font-serif italic text-2xl md:text-3xl mb-1" style={{ color:"#7a9070", textShadow: "0 4px 15px rgba(253, 251, 247, 0.6)" }}>Sabato</p>
                  <p className="font-serif italic text-4xl md:text-5xl font-medium" style={{ color:"#7a9070", textShadow: "0 4px 15px rgba(253, 251, 247, 0.6)" }}>5 Settembre 2026</p>
                </div>
              </div>
              
              <div ref={scrollArrowRef} className="absolute inset-x-0 bottom-8 z-[3] invisible opacity-0 pointer-events-none">
                <div className="mx-auto flex flex-col items-center gap-3 cursor-pointer pointer-events-auto w-max"
                  onClick={() => window.scrollBy({ top: window.innerHeight, behavior: 'smooth' })}
                  style={{ animation:"heroScrollFloat 2.5s ease-in-out infinite" }}>
                  <span className="font-sans text-[11px] uppercase tracking-[0.3em]" style={{ color:"#7a9070", fontWeight: 600 }}>Scorri</span>
                  <svg width="28" height="16" viewBox="0 0 28 16" fill="none">
                    <path d="M2 2 L14 14 L26 2" stroke="#7a9070" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                </div>
              </div>
              <style>{`
                @keyframes heroScrollFloat {
                  0%,100%{ transform:translateY(0);   opacity:0.8; }
                  50%     { transform:translateY(8px); opacity:1;   }
                }
                .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
                @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
              `}</style>
            </section>
            
            <BotanicalDivider />
            
            {/* [SECT_COUNTDOWN] */}
            <section className="py-28 md:py-40 px-6 text-center reveal" style={{ backgroundColor:"#FDFBF7" }}>
              <div className="stagger-group">
                <h2 className="font-serif italic text-2xl md:text-4xl mb-12 px-4 leading-relaxed max-w-2xl mx-auto" style={{ color:"#7a9070" }}>
                  Conto alla rovescia al giorno più Speciale della nostra Vita
                </h2>
              </div>
              <Countdown />
            </section>
            
            <BotanicalDivider />
            
            {/* [SECT_LOCATION] */}
            <section className="py-28 md:py-40 px-6 text-center max-w-3xl mx-auto stagger-group">
              <div className="text-center mb-12">
                <p className="font-serif italic text-base tracking-[0.4em] uppercase mb-3" style={{ color: "#F4B9A1" }}>✦   La Location   ✦</p>
                <h2 className="font-serif text-4xl md:text-5xl font-light" style={{ color: "#7a9070" }}>Dove Festeggeremo</h2>
              </div>
              
              <div className="inline-block w-full max-w-lg mx-auto text-center px-8 py-10 rounded-xl" style={{ border:"1px solid rgba(163,184,153,0.5)", backgroundColor: "rgba(253, 251, 247, 0.8)" }}>
                <div className="w-full mb-10 relative rounded-lg overflow-hidden shadow-[0_8px_25px_-10px_rgba(163,184,153,0.4)] border border-[#A3B899]/40">
                  <img src={LOCATION_IMG} alt="Ristorante Golden Gate" className="w-full h-auto object-cover transform hover:scale-105 transition-transform duration-1000" style={{ filter: 'contrast(1.08) sepia(0.15)' }} />
                  <div className="absolute inset-0 pointer-events-none" style={{ backgroundColor: "#F4B9A1", mixBlendMode: "multiply", opacity: 0.15 }}></div>
                </div>
                
                <p className="font-serif text-xl md:text-2xl leading-relaxed mb-4" style={{ color: "#7a9070" }}>
                  La Cerimonia Civile e il Ricevimento si svolgeranno presso il
                </p>
                <h3 className="font-serif italic text-3xl md:text-4xl font-bold mb-6" style={{ color:"#7a9070" }}>Ristorante Golden Gate</h3>
                <p className="font-sans text-sm uppercase tracking-[0.3em] mb-8 font-medium" style={{ color:"#7a9070" }}>Loc. La Fumosa, Bortigiadas — OT</p>
                
                <a href="https://www.google.com/maps?sca_esv=d22b1170cb5b1f6e&daddr=Strada+Statale+127+Settentrionale+Sarda,+07030+Bortigiadas+OT"
                  target="_blank" rel="noopener noreferrer"
                  className="inline-block font-sans text-xs uppercase tracking-[0.35em] px-10 py-4 transition-all rounded-full"
                  style={{ color:"#FDFBF7", backgroundColor:"#A3B899", fontWeight: "bold" }}
                  onMouseEnter={e => { e.currentTarget.style.backgroundColor="#7a9070"; }}
                  onMouseLeave={e => { e.currentTarget.style.backgroundColor="#A3B899"; }}>
                  Apri su Maps
                </a>
              </div>
            </section>
            
            <BotanicalDivider />
            {/* [SECT_TIMELINE] */}
            <Timeline />
            <BotanicalDivider />
            {/* [SECT_RSVP] */}
            <RSVPForm />
            <BotanicalDivider />
            {/* [SECT_GALLERY] */}
            <PhotoGallery />
            {/* [SECT_QUOTES] */}
            <QuotesTicker />
            <BotanicalDivider />
            
            {/* [SECT_FOOTER] */}
            <footer className="relative py-20 md:py-28 text-center overflow-hidden">
              <p className="font-serif italic text-sm mb-8" style={{ color: "#7a9070", opacity: 0.85 }}>Debora & Luca · 5 Settembre 2026</p>
              <div className="flex items-center justify-center gap-3 mb-2">
                <div className="h-px w-8" style={{ backgroundColor: "#A3B899", opacity: 0.5 }} />
                <p className="font-sans text-xs uppercase tracking-[0.3em] font-semibold" style={{ color: "#7a9070", opacity: 0.8 }}>Per informazioni</p>
                <div className="h-px w-8" style={{ backgroundColor: "#A3B899", opacity: 0.5 }} />
              </div>
              <div className="flex flex-col sm:flex-row items-center justify-center gap-6 mt-4 relative z-10">
                <a href="tel:+393455142963" className="font-serif italic text-lg transition-opacity hover:opacity-80" style={{ color: "#7a9070", fontWeight: 500 }}>Debora · 345 514 2963</a>
                <span className="hidden sm:block font-serif" style={{ color: "#F4B9A1", fontSize: "0.8rem" }}>✦</span>
                <a href="tel:+393475145114" className="font-serif italic text-lg transition-opacity hover:opacity-80" style={{ color: "#7a9070", fontWeight: 500 }}>Luca · 347 514 5114</a>
              </div>
              
              <div className="mt-16 relative z-10">
                <a href="https://announceyourday.com" target="_blank" rel="noopener noreferrer" 
                   className="inline-block font-sans text-[10px] uppercase tracking-widest transition-colors duration-300"
                   style={{ color: "#A3B899" }}
                   onMouseEnter={e => { e.currentTarget.style.color="#7a9070"; }}
                   onMouseLeave={e => { e.currentTarget.style.color="#A3B899"; }}>
                  creato con ❤️ da announceyourday.com
                </a>
              </div>
            </footer>
            
          </div>
          
          <MusicPlayer playing={musicPlaying} onToggle={toggleMusic} />
        </>
      );
    }
    
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
